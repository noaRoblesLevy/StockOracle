<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StockOracle — AI Price Predictor</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --warn: #e3b341;
    --danger: #f85149;
    --text: #e6edf3;
    --text2: #8b949e;
    --radius: 10px;
    --up: #3fb950;
    --down: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* ─── HEADER ─── */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 1.3rem; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
  .logo span { color: var(--text2); font-weight: 400; font-size: 0.85rem; margin-left: 8px; }

  /* ─── SEARCH ─── */
  .search-wrap { display: flex; gap: 10px; flex: 1; max-width: 600px; position: relative; }
  .search-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 9px 14px; color: var(--text); font-size: 0.95rem; outline: none; transition: border 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-dropdown {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    max-height: 340px; overflow-y: auto; z-index: 200; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .search-dropdown.open { display: block; }
  .dd-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; transition: background 0.1s;
    border-bottom: 1px solid var(--border);
  }
  .dd-item:last-child { border-bottom: none; }
  .dd-item:hover { background: var(--border); }
  .dd-symbol { font-weight: 700; font-size: 0.9rem; color: var(--accent); min-width: 60px; }
  .dd-name { font-size: 0.82rem; color: var(--text2); flex: 1; }
  .dd-badge { font-size: 0.7rem; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
  .badge-stock { background: rgba(88,166,255,0.15); color: var(--accent); }
  .badge-etf { background: rgba(63,185,80,0.15); color: var(--accent2); }

  /* ─── HORIZON TABS ─── */
  .tabs { display: flex; gap: 6px; margin-left: auto; }
  .tab {
    padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border);
    cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: all 0.2s; color: var(--text2);
    background: transparent;
  }
  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* ─── MAIN ─── */
  .main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  /* ─── LANDING ─── */
  .landing {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 65vh; text-align: center; gap: 16px;
  }
  .landing-icon { font-size: 4rem; margin-bottom: 8px; }
  .landing h2 { font-size: 2rem; font-weight: 700; color: var(--text); }
  .landing p { font-size: 1rem; color: var(--text2); max-width: 480px; line-height: 1.6; }
  .popular-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
  .pop-chip {
    padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px;
    cursor: pointer; font-size: 0.82rem; font-weight: 600; color: var(--accent);
    transition: all 0.15s; background: rgba(88,166,255,0.06);
  }
  .pop-chip:hover { background: rgba(88,166,255,0.15); border-color: var(--accent); }

  /* ─── TICKER HEADER ─── */
  .ticker-hero { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; margin-bottom: 24px; }
  .ticker-name { font-size: 1.6rem; font-weight: 700; }
  .ticker-sub { font-size: 0.9rem; color: var(--text2); }
  .price-block { margin-left: auto; text-align: right; }
  .price-current { font-size: 2rem; font-weight: 700; }
  .price-change { font-size: 0.95rem; font-weight: 600; }
  .up { color: var(--up); }
  .down { color: var(--down); }
  .neutral { color: var(--text2); }

  /* ─── GRID LAYOUT ─── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 16px; }
  .span-2 { grid-column: span 2; }
  .span-3 { grid-column: span 3; }
  .span-4 { grid-column: span 4; }

  /* ─── CARD ─── */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px; overflow: hidden;
  }
  .card-title { font-size: 0.78rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; }

  /* ─── STAT GRID ─── */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
  .stat-item { background: var(--surface2); border-radius: 8px; padding: 12px 14px; }
  .stat-label { font-size: 0.72rem; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
  .stat-value { font-size: 1.05rem; font-weight: 700; }

  /* ─── PREDICTION CARDS ─── */
  .pred-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .pred-card {
    background: var(--surface2); border-radius: 8px; padding: 16px;
    border: 1px solid var(--border); transition: border-color 0.2s;
  }
  .pred-card.ensemble { border-color: var(--accent); background: rgba(88,166,255,0.05); }
  .pred-label { font-size: 0.75rem; color: var(--text2); margin-bottom: 4px; font-weight: 600; }
  .pred-price { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
  .pred-change { font-size: 0.82rem; font-weight: 600; margin-bottom: 8px; }
  .pred-conf { font-size: 0.75rem; color: var(--text2); }
  .conf-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .conf-fill { height: 100%; border-radius: 2px; transition: width 0.6s; }

  /* ─── SIGNAL INDICATORS ─── */
  .signals { display: flex; flex-wrap: wrap; gap: 8px; }
  .signal {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 700;
    border: 1px solid transparent;
  }
  .signal-dot { width: 8px; height: 8px; border-radius: 50%; }
  .sig-buy { background: rgba(63,185,80,0.12); color: var(--up); border-color: rgba(63,185,80,0.3); }
  .sig-sell { background: rgba(248,81,73,0.12); color: var(--down); border-color: rgba(248,81,73,0.3); }
  .sig-neutral { background: rgba(139,148,158,0.12); color: var(--text2); border-color: var(--border); }
  .sig-buy .signal-dot { background: var(--up); }
  .sig-sell .signal-dot { background: var(--down); }
  .sig-neutral .signal-dot { background: var(--text2); }

  /* ─── MODEL COMPARISON TABLE ─── */
  .model-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .model-table th { text-align: left; padding: 8px 12px; color: var(--text2); font-size: 0.72rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .model-table td { padding: 10px 12px; border-bottom: 1px solid rgba(48,54,61,0.5); }
  .model-table tr:last-child td { border-bottom: none; }
  .model-table tr:hover td { background: rgba(48,54,61,0.4); }
  .model-name { font-weight: 600; }
  .model-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
  .badge-ensemble { background: rgba(88,166,255,0.2); color: var(--accent); }

  /* ─── CARD HEADER ROW (title + toggle) ─── */
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
  .card-header .card-title { margin-bottom: 0; }

  /* ─── CHART MODE TOGGLE ─── */
  .ctog-group { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .ctog {
    padding: 4px 11px; font-size: 0.72rem; font-weight: 600; cursor: pointer;
    background: transparent; color: var(--text2); border: none; outline: none;
    transition: background 0.15s, color 0.15s; letter-spacing: 0.3px;
  }
  .ctog + .ctog { border-left: 1px solid var(--border); }
  .ctog.active { background: var(--accent); color: #000; }

  /* ─── RSI GAUGE ─── */
  .rsi-bar { height: 10px; border-radius: 5px; background: linear-gradient(to right, var(--down), var(--warn), var(--up)); position: relative; margin: 8px 0; }
  .rsi-needle { position: absolute; top: -4px; width: 4px; height: 18px; background: white; border-radius: 2px; transform: translateX(-50%); }

  /* ─── LOADING / ERROR ─── */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); border-radius: var(--radius); padding: 20px; text-align: center; color: var(--down); }

  /* ─── DISCLAIMER ─── */
  .disclaimer { font-size: 0.72rem; color: var(--text2); text-align: center; padding: 16px; margin-top: 16px; border-top: 1px solid var(--border); line-height: 1.5; }

  /* ─── BACK BUTTON ─── */
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; font-size: 0.82rem; font-weight: 600; color: var(--text2);
    background: transparent; margin-bottom: 18px; transition: all 0.15s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ─── RANKINGS TABLE ─── */
  .rank-wrap { overflow-x: auto; }
  .rank-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
  .rank-table th {
    text-align: left; padding: 9px 12px; color: var(--text2);
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
    white-space: nowrap;
  }
  .rank-table th:hover { color: var(--text); }
  .rank-table th.sort-asc::after  { content: ' ↑'; color: var(--accent); }
  .rank-table th.sort-desc::after { content: ' ↓'; color: var(--accent); }
  .rank-table td { padding: 10px 12px; border-bottom: 1px solid rgba(48,54,61,0.4); vertical-align: middle; }
  .rank-table tr:last-child td { border-bottom: none; }
  .rank-table tr:hover td { background: rgba(48,54,61,0.4); cursor: pointer; }
  .rank-num { font-size: 0.75rem; color: var(--text2); font-weight: 700; min-width: 28px; text-align: center; }
  .rank-sym { font-weight: 800; color: var(--accent); font-size: 0.9rem; }
  .rank-name { color: var(--text2); font-size: 0.78rem; display: block; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rank-sector { font-size: 0.68rem; color: var(--text2); opacity: 0.7; }
  .dir-up   { color: var(--up);   font-weight: 800; }
  .dir-down { color: var(--down); font-weight: 800; }
  .conf-mini { display: flex; align-items: center; gap: 6px; }
  .conf-mini-bar { width: 60px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; position: relative; }
  .conf-mini-mid { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.2); }
  .conf-mini-fill { height: 100%; border-radius: 3px; }

  /* ─── HOME PAGE HEADER ─── */
  .home-hero { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 20px; }
  .home-hero h2 { font-size: 1.4rem; font-weight: 700; flex: 1; }
  .rank-controls { display: flex; align-items: center; gap: 8px; }
  .rank-horizon { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .rank-horizon button {
    padding: 5px 13px; font-size: 0.75rem; font-weight: 600;
    background: transparent; border: none; color: var(--text2); cursor: pointer;
    transition: all 0.15s;
  }
  .rank-horizon button + button { border-left: 1px solid var(--border); }
  .rank-horizon button.active { background: var(--accent); color: #000; }
  .refresh-btn {
    padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px;
    background: transparent; color: var(--text2); font-size: 0.75rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
  .cache-note { font-size: 0.68rem; color: var(--text2); opacity: 0.7; }
  .pop-chips-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }

  /* ─── PORTFOLIO NAV BUTTON ─── */
  .portfolio-nav-btn {
    padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border);
    cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: all 0.2s;
    color: var(--text2); background: transparent; margin-left: 6px;
  }
  .portfolio-nav-btn:hover, .portfolio-nav-btn.active { background: #e3b341; color: #000; border-color: #e3b341; }

  /* ─── PORTFOLIO VIEW ─── */
  .pf-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .pf-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .pf-card-label { font-size: 0.7rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .pf-card-val { font-size: 1.4rem; font-weight: 800; }
  .pf-card-sub { font-size: 0.72rem; color: var(--text2); margin-top: 3px; }
  .pf-actions { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .pf-rebalance-btn {
    padding: 8px 20px; border-radius: 8px; border: 1px solid var(--accent);
    background: transparent; color: var(--accent); font-size: 0.82rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .pf-rebalance-btn:hover { background: var(--accent); color: #000; }
  .pf-rebalance-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .pf-meta { font-size: 0.72rem; color: var(--text2); }
  .pf-pos-table, .pf-trade-table {
    width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 8px;
  }
  .pf-pos-table th, .pf-trade-table th {
    padding: 8px 10px; text-align: left; color: var(--text2); font-size: 0.68rem;
    text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid var(--border);
    white-space: nowrap; cursor: default;
  }
  .pf-pos-table td, .pf-trade-table td {
    padding: 9px 10px; border-bottom: 1px solid rgba(48,54,61,0.4); vertical-align: middle;
  }
  .pf-pos-table tr:last-child td, .pf-trade-table tr:last-child td { border-bottom: none; }
  .pf-sym { font-weight: 800; color: var(--accent); }
  .trade-buy  { background: rgba(63,185,80,0.1);  }
  .trade-sell { background: rgba(248,81,73,0.07); }
  .pf-empty { color: var(--text2); text-align: center; padding: 30px; font-size: 0.85rem; }
  .signal-stale { background: rgba(248,81,73,0.08); }
  .stale-badge {
    display: inline-block; font-size: 0.6rem; font-weight: 800; letter-spacing: 0.3px;
    padding: 2px 5px; border-radius: 4px; background: rgba(248,81,73,0.18);
    color: #f85149; margin-left: 5px; vertical-align: middle; white-space: nowrap;
  }

  @media (max-width: 900px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    .span-2, .span-3, .span-4 { grid-column: span 1; }
    .header { flex-wrap: wrap; }
    .tabs { order: 3; width: 100%; }
    .rank-name { max-width: 120px; }
    .pf-summary { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .pf-summary { grid-template-columns: 1fr; }
    .pf-actions { flex-direction: column; align-items: flex-start; }
    .pf-pos-table-wrap, .pf-trade-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .pf-pos-table, .pf-trade-table { min-width: 640px; }
    .pf-card-val { font-size: 1.2rem; }
    .header-btns { flex-wrap: wrap; gap: 6px; }
  }
  .pf-pos-table-wrap, .pf-trade-table-wrap { width: 100%; }
  .pf-load-more {
    display: block; width: 100%; margin-top: 10px; padding: 9px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text2); border-radius: 8px; font-size: 0.8rem;
    cursor: pointer; transition: border-color 0.2s, color 0.2s;
  }
  .pf-load-more:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">StockOracle <span>AI Price Predictor</span></div>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" placeholder="Search stocks or ETFs (e.g. AAPL, SPY)..." autocomplete="off" />
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
  <div class="tabs">
    <button class="tab" data-horizon="day">1 Day</button>
    <button class="tab active" data-horizon="week">1 Week</button>
    <button class="tab" data-horizon="month">1 Month</button>
  </div>
  <button class="portfolio-nav-btn" id="portfolioNavBtn" onclick="showPortfolio()">&#128200; Portfolio</button>
</div>

<!-- ─── HOME PAGE ─── -->
<div id="landingView" class="main">
  <div class="home-hero">
    <h2>Market Rankings</h2>
    <div class="rank-controls">
      <div class="rank-horizon" id="rankHorizonBtns">
        <button class="active" data-h="day"   onclick="setRankHorizon('day')">1 Day</button>
        <button             data-h="week"  onclick="setRankHorizon('week')">1 Week</button>
        <button             data-h="month" onclick="setRankHorizon('month')">1 Month</button>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadRankings(true)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Refresh
      </button>
    </div>
  </div>
  <div class="pop-chips-row" id="popularGrid"></div>
  <div id="rankingsArea">
    <div class="loading"><div class="spinner"></div><div style="color:var(--text2)">Loading market rankings...</div></div>
  </div>
</div>

<!-- ─── STOCK DASHBOARD ─── -->
<div id="dashboardView" class="main" style="display:none">
  <button class="back-btn" onclick="showLanding()">&#8592; Back to Rankings</button>
  <div id="dashboardContent"></div>
</div>

<!-- ─── PORTFOLIO VIEW ─── -->
<div id="portfolioView" class="main" style="display:none">
  <button class="back-btn" onclick="showLanding()">&#8592; Back to Rankings</button>
  <div id="portfolioContent">
    <div class="loading"><div class="spinner"></div><div style="color:var(--text2)">Loading portfolio...</div></div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let currentSymbol  = null;
let currentHorizon = 'week';
let rankHorizon    = 'week';
let allTickers     = [];
let searchTimeout  = null;
let rankSortCol    = 'pred_pct';
let rankSortAsc    = false;   // descending by default (biggest gainers first)
let rankData       = [];
let pfPollTimer    = null;    // portfolio auto-refresh interval
let pfLastFetch    = null;    // timestamp of last portfolio fetch

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/api/tickers');
    allTickers = await res.json();
  } catch(e) {}
  renderPopularChips();
  setupSearch();
  setupTabs();
  loadRankings(false);
}

// ─── View switching ───────────────────────────────────────────────────────────
function _stopPfPoll() {
  if (pfPollTimer) { clearInterval(pfPollTimer); pfPollTimer = null; }
  if (window._pfAgoTimer) { clearInterval(window._pfAgoTimer); window._pfAgoTimer = null; }
}
function showLanding() {
  _stopPfPoll();
  document.getElementById('landingView').style.display   = 'block';
  document.getElementById('dashboardView').style.display = 'none';
  document.getElementById('portfolioView').style.display = 'none';
  document.getElementById('portfolioNavBtn').classList.remove('active');
  document.getElementById('searchInput').value = '';
  currentSymbol = null;
}
function showDashboard() {
  _stopPfPoll();
  document.getElementById('landingView').style.display   = 'none';
  document.getElementById('dashboardView').style.display = 'block';
  document.getElementById('portfolioView').style.display = 'none';
  document.getElementById('portfolioNavBtn').classList.remove('active');
}
function showPortfolio() {
  _stopPfPoll();
  document.getElementById('landingView').style.display   = 'none';
  document.getElementById('dashboardView').style.display = 'none';
  document.getElementById('portfolioView').style.display = 'block';
  document.getElementById('portfolioNavBtn').classList.add('active');
  loadPortfolio();
  // Refresh prices every 30 s while tab is open

}

// ─── Rankings ─────────────────────────────────────────────────────────────────
function setRankHorizon(h) {
  rankHorizon = h;
  document.querySelectorAll('#rankHorizonBtns button').forEach(b => {
    b.classList.toggle('active', b.dataset.h === h);
  });
  // sync the prediction tabs too
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.horizon === h);
  });
  currentHorizon = h;
  loadRankings(false);
}

async function loadRankings(force) {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('rankingsArea').innerHTML =
    `<div class="loading"><div class="spinner"></div><div style="color:var(--text2)">Screening 30 stocks${force ? ' (refreshing)' : ''}...</div></div>`;

  try {
    const res  = await fetch(`/api/rankings?horizon=${rankHorizon}${force ? '&refresh=true' : ''}`);
    const data = await res.json();
    if (data.error) {
      document.getElementById('rankingsArea').innerHTML =
        `<div class="error-box">Rankings error: ${data.error}</div>`;
      return;
    }
    rankData   = data.rankings;
    const cached = data.from_cache;
    const genAt  = new Date(data.generated_at).toLocaleTimeString();
    renderRankingsTable(cached, genAt, data.horizon);
  } catch(e) {
    document.getElementById('rankingsArea').innerHTML =
      `<div class="error-box">Failed to load rankings. Is the server running?</div>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

function renderRankingsTable(fromCache, genAt, horizon) {
  const horizonLabel = {day:'Next Day', week:'Next Week', month:'Next Month'}[horizon] || horizon;
  const sorted = [...rankData].sort((a, b) => {
    const av = a[rankSortCol] ?? 0, bv = b[rankSortCol] ?? 0;
    return rankSortAsc ? av - bv : bv - av;
  });

  const colDefs = [
    {key:'rank',       label:'#'},
    {key:'symbol',     label:'Symbol'},
    {key:'price',      label:'Price'},
    {key:'pred_pct',   label:`Predicted (${horizonLabel})`},
    {key:'confidence', label:'Signal Conf.'},
    {key:'rsi',        label:'RSI'},
    {key:'mom_5d',     label:'5D Momentum'},
  ];

  const thHtml = colDefs.map(c => {
    const cls = c.key === rankSortCol ? (rankSortAsc ? 'sort-asc' : 'sort-desc') : '';
    return `<th class="${cls}" onclick="sortRankings('${c.key}')">${c.label}</th>`;
  }).join('');

  const rows = sorted.map(r => {
    const pctCls  = r.pred_pct >= 0 ? 'dir-up' : 'dir-down';
    const pctStr  = `${r.pred_pct >= 0 ? '+' : ''}${r.pred_pct.toFixed(2)}%`;
    const confPct = Math.round(r.confidence * 100);
    const confCol = confPct >= 58 ? '#3fb950' : confPct >= 53 ? '#e3b341' : '#8b949e';
    const edge    = confPct - 50;
    const rsiCol  = r.rsi > 70 ? 'var(--down)' : r.rsi < 30 ? 'var(--up)' : 'var(--text2)';
    const momStr  = r.mom_5d != null ? `${r.mom_5d >= 0 ? '+' : ''}${r.mom_5d.toFixed(2)}%` : '—';
    const momCls  = r.mom_5d >= 0 ? 'dir-up' : 'dir-down';
    return `
      <tr onclick="selectSymbol('${r.symbol}')">
        <td><span class="rank-num">${r.rank}</span></td>
        <td>
          <span class="rank-sym">${r.symbol}</span>
          <span class="rank-name">${r.name}</span>
          <span class="rank-sector">${r.sector}</span>
        </td>
        <td>$${r.price.toFixed(2)}</td>
        <td class="${pctCls}" style="font-weight:700;font-size:0.95rem">${pctStr}</td>
        <td>
          <div class="conf-mini">
            <div class="conf-mini-bar">
              <div class="conf-mini-mid"></div>
              <div class="conf-mini-fill" style="width:${confPct}%;background:${confCol}"></div>
            </div>
            <span style="font-size:0.78rem;color:${confCol}">${confPct}%</span>
            <span style="font-size:0.68rem;color:var(--text2)">${edge>=0?'+':''}${edge}pp</span>
          </div>
        </td>
        <td style="color:${rsiCol};font-weight:600">${r.rsi}</td>
        <td class="${momCls}">${momStr}</td>
      </tr>`;
  }).join('');

  const cacheNote = fromCache
    ? `<span class="cache-note">Cached at ${genAt} · <a href="#" onclick="loadRankings(true);return false" style="color:var(--accent)">refresh now</a></span>`
    : `<span class="cache-note">Updated at ${genAt}</span>`;

  document.getElementById('rankingsArea').innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <span style="font-size:0.78rem;color:var(--text2)">
          30 tickers ranked by predicted ${horizonLabel.toLowerCase()} move.
          Confidence = 5-window walk-forward backtest on LR+EMA. Click any row to analyze.
        </span>
        ${cacheNote}
      </div>
      <div class="rank-wrap">
        <table class="rank-table">
          <thead><tr>${thHtml}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
    <div class="disclaimer">
      Rankings use fast screening models (LR + EMA). For full analysis with ARIMA, Holt-Winters and 15-window backtesting, click a row.
      Not financial advice.
    </div>`;
}

function sortRankings(col) {
  if (rankSortCol === col) rankSortAsc = !rankSortAsc;
  else { rankSortCol = col; rankSortAsc = col === 'rank'; }
  if (rankData.length) {
    const cached = true;
    renderRankingsTable(cached, '', rankHorizon);
  }
}

// ─── Search ───────────────────────────────────────────────────────────────────
function setupSearch() {
  const input = document.getElementById('searchInput');
  const dd = document.getElementById('searchDropdown');

  input.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    const q = input.value.trim();
    if (!q) { dd.classList.remove('open'); return; }
    searchTimeout = setTimeout(() => doSearch(q), 200);
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') { dd.classList.remove('open'); input.blur(); }
    if (e.key === 'Enter') {
      const q = input.value.trim().toUpperCase();
      if (q) selectSymbol(q);
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) dd.classList.remove('open');
  });
}

async function doSearch(q) {
  const dd = document.getElementById('searchDropdown');
  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const results = await res.json();
    if (!results.length) { dd.classList.remove('open'); return; }
    dd.innerHTML = results.map(t => `
      <div class="dd-item" onclick="selectSymbol('${t.symbol}')">
        <span class="dd-symbol">${t.symbol}</span>
        <span class="dd-name">${t.name}</span>
        <span class="dd-badge ${t.type === 'ETF' ? 'badge-etf' : 'badge-stock'}">${t.type}</span>
        <small style="color:var(--text2);font-size:0.7rem">${t.sector}</small>
      </div>`).join('');
    dd.classList.add('open');
  } catch(e) {}
}

// ─── Signals ──────────────────────────────────────────────────────────────────
function renderSignals(stats) {
  const signals = [];

  // RSI
  if (stats.rsi !== null) {
    if (stats.rsi < 30) signals.push({cls: 'sig-buy', dot: '', label: `RSI Oversold (${stats.rsi})`});
    else if (stats.rsi > 70) signals.push({cls: 'sig-sell', dot: '', label: `RSI Overbought (${stats.rsi})`});
    else signals.push({cls: 'sig-neutral', dot: '', label: `RSI Neutral (${stats.rsi})`});
  }

  // MACD
  if (stats.macd !== null && stats.macd_signal !== null) {
    if (stats.macd > stats.macd_signal) signals.push({cls: 'sig-buy', dot: '', label: 'MACD Bullish Cross'});
    else signals.push({cls: 'sig-sell', dot: '', label: 'MACD Bearish Cross'});
  }

  // Golden cross
  if (stats.golden_cross) signals.push({cls: 'sig-buy', dot: '', label: 'Golden Cross (EMA50 > EMA200)'});
  else signals.push({cls: 'sig-sell', dot: '', label: 'Death Cross (EMA50 < EMA200)'});

  // Price vs EMA50
  if (stats.current_price > stats.ema_50) signals.push({cls: 'sig-buy', dot: '', label: 'Above EMA50'});
  else signals.push({cls: 'sig-sell', dot: '', label: 'Below EMA50'});

  // Trend
  const trendPct = ((stats.current_price - stats.low_52w) / (stats.high_52w - stats.low_52w)) * 100;
  if (trendPct > 70) signals.push({cls: 'sig-sell', dot: '', label: `Near 52W High (${Math.round(trendPct)}%)`});
  else if (trendPct < 30) signals.push({cls: 'sig-buy', dot: '', label: `Near 52W Low (${Math.round(trendPct)}%)`});

  const el = document.getElementById('signalsArea');
  el.innerHTML = signals.map(s => `
    <div class="signal ${s.cls}"><span class="signal-dot"></span>${s.label}</div>`).join('');
}

// ─── Prediction Cards ─────────────────────────────────────────────────────────
function renderPredCards(predictions, currentPrice, forecast_dates) {
  const order = ['ensemble', 'arima', 'linear_regression', 'ema_crossover', 'holt_winters'];
  const el = document.getElementById('predCards');
  let html = '';
  for (const key of order) {
    const m = predictions[key];
    if (!m) continue;
    const target  = m.predictions[m.predictions.length - 1];
    const chg     = ((target - currentPrice) / currentPrice) * 100;
    const conf    = Math.round((m.confidence || 0) * 100);
    const edge    = conf - 50;
    const edgeStr = edge >= 0 ? `+${edge}pp edge` : `${edge}pp`;
    // Color thresholds are now honest: >=58% = good, >=53% = ok, <53% = weak
    const confColor = conf >= 58 ? '#3fb950' : conf >= 53 ? '#e3b341' : '#8b949e';
    const dirArrow  = chg >= 0 ? '▲' : '▼';
    const dirLabel  = chg >= 0 ? 'LONG' : 'SHORT';
    // Extra ensemble fields
    const agrHtml = key === 'ensemble' && m.agreement != null
      ? `<div style="font-size:0.72rem;color:var(--text2);margin-top:4px">Agreement: ${Math.round(m.agreement*100)}%</div>`
      : '';
    html += `
      <div class="pred-card ${key === 'ensemble' ? 'ensemble' : ''}">
        <div class="pred-label">${m.label}${key === 'ensemble' ? ' <span class="model-badge badge-ensemble">BEST</span>' : ''}</div>
        <div style="display:flex;align-items:baseline;gap:8px">
          <div class="pred-price ${chg >= 0 ? 'up' : 'down'}">$${fmt(target)}</div>
          <div style="font-size:1rem;font-weight:700;color:${chg>=0?'var(--up)':'var(--down)'}">${dirArrow} ${dirLabel}</div>
        </div>
        <div class="pred-change ${chg >= 0 ? 'up' : 'down'}">${chg >= 0 ? '+' : ''}${fmt(chg)}%</div>
        <div class="pred-conf" style="margin-top:6px">Backtest accuracy: <strong style="color:${confColor}">${conf}%</strong> <span style="color:var(--text2);font-size:0.7rem">(${edgeStr})</span></div>
        <div class="conf-bar" style="position:relative">
          <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.15)"></div>
          <div class="conf-fill" style="width:${conf}%;background:${confColor}"></div>
        </div>
        ${agrHtml}
      </div>`;
  }
  el.innerHTML = html;
}

// ─── Price Chart ──────────────────────────────────────────────────────────────
function renderPriceChart(historical, forecast_dates, predictions, mode) {
  const dates = historical.dates;
  const ensemble = predictions.ensemble;
  const lastPrice = historical.close[historical.close.length - 1];
  const firstPrice = historical.close[0];
  const isPct = mode === 'cum';

  // Convert a price series to cumulative % from firstPrice
  const toPct = arr => arr.map(v => v === null ? null : round2(((v - firstPrice) / firstPrice) * 100));
  const yClose   = isPct ? historical.cum_pct      : historical.close;
  const yBbU     = isPct ? toPct(historical.bb_upper) : historical.bb_upper;
  const yBbL     = isPct ? toPct(historical.bb_lower) : historical.bb_lower;
  const yEma21   = isPct ? toPct(historical.ema_21)   : historical.ema_21;
  const yEma50   = isPct ? toPct(historical.ema_50)   : historical.ema_50;
  const yAxisLabel = isPct ? '% Change' : 'Price (USD)';
  const yTickSuf   = isPct ? '%' : '';

  const traces = [
    { x: dates, y: yClose, type: 'scatter', mode: 'lines', name: 'Close',
      line: {color: '#58a6ff', width: 2} },
    { x: dates, y: yBbU, type: 'scatter', mode: 'lines', name: 'BB Upper',
      line: {color: 'rgba(227,179,65,0.5)', width: 1, dash: 'dot'}, showlegend: true },
    { x: dates, y: yBbL, type: 'scatter', mode: 'lines', name: 'BB Lower',
      line: {color: 'rgba(227,179,65,0.5)', width: 1, dash: 'dot'},
      fill: 'tonexty', fillcolor: 'rgba(227,179,65,0.05)', showlegend: false },
    { x: dates, y: yEma21, type: 'scatter', mode: 'lines', name: 'EMA 21',
      line: {color: 'rgba(63,185,80,0.7)', width: 1.5} },
    { x: dates, y: yEma50, type: 'scatter', mode: 'lines', name: 'EMA 50',
      line: {color: 'rgba(248,81,73,0.7)', width: 1.5} },
  ];

  if (ensemble) {
    const connDates  = [dates[dates.length - 1], ...forecast_dates];
    const connPrices = [lastPrice, ...ensemble.predictions];
    const connY = isPct ? connPrices.map(p => round2(((p - firstPrice) / firstPrice) * 100)) : connPrices;
    const bandPct = isPct ? 2 : 0;   // ±2 pp in % mode
    const bandMul = isPct ? 0 : 0.02; // ±2% in price mode
    const upper = connY.map(v => isPct ? v + bandPct : v * (1 + bandMul));
    const lower = connY.map(v => isPct ? v - bandPct : v * (1 - bandMul));

    traces.push({ x: connDates, y: connY, type: 'scatter', mode: 'lines+markers',
      name: 'Ensemble Forecast', line: {color: '#c084fc', width: 2, dash: 'dash'}, marker: {size: 6} });
    traces.push({ x: connDates, y: upper, type: 'scatter', mode: 'lines',
      showlegend: false, line: {color: 'rgba(192,132,252,0.2)', width: 0} });
    traces.push({ x: connDates, y: lower, type: 'scatter', mode: 'lines',
      showlegend: false, fill: 'tonexty', fillcolor: 'rgba(192,132,252,0.12)',
      line: {color: 'rgba(192,132,252,0.2)', width: 0} });
  }

  const layout = {...chartLayout(), yaxis: {...chartLayout().yaxis, title: {text: yAxisLabel, font:{size:11,color:'#8b949e'}}, ticksuffix: yTickSuf}};
  Plotly.newPlot('priceChart', traces, layout, {responsive: true, displayModeBar: false});
}

// ─── Forecast Comparison ──────────────────────────────────────────────────────
function renderForecastChart(historical, forecast_dates, predictions, mode) {
  const lastPrice = historical.close[historical.close.length - 1];
  const lastDate  = historical.dates[historical.dates.length - 1];
  const isPct = mode === 'pct';
  const modelColors = { ensemble:'#c084fc', arima:'#58a6ff', linear_regression:'#3fb950', ema_crossover:'#e3b341', holt_winters:'#f97316' };
  const traces = [];

  for (const [key, m] of Object.entries(predictions)) {
    const rawPrices = [lastPrice, ...m.predictions];
    const yVals = isPct
      ? rawPrices.map(p => round2(((p - lastPrice) / lastPrice) * 100))
      : rawPrices;
    traces.push({
      x: [lastDate, ...forecast_dates], y: yVals,
      type: 'scatter', mode: 'lines+markers', name: m.label,
      line: {color: modelColors[key] || '#fff', width: key === 'ensemble' ? 3 : 1.5, dash: key === 'ensemble' ? 'solid' : 'dot'},
      marker: {size: key === 'ensemble' ? 7 : 4}
    });
  }

  // Zero baseline in % mode
  if (isPct) {
    traces.unshift({ x: [lastDate, ...forecast_dates], y: new Array(forecast_dates.length + 1).fill(0),
      type: 'scatter', mode: 'lines', name: 'Current', showlegend: true,
      line: {color: 'rgba(255,255,255,0.2)', width: 1, dash: 'dot'} });
  }

  const layout = {...chartLayout(true),
    yaxis: {...chartLayout(true).yaxis,
      title: {text: isPct ? '% Change from Today' : 'Price (USD)', font:{size:11,color:'#8b949e'}},
      ticksuffix: isPct ? '%' : '' }};
  Plotly.newPlot('forecastChart', traces, layout, {responsive: true, displayModeBar: false});
}

// ─── Daily Returns / Volume toggle chart ─────────────────────────────────────
function renderReturnsChart(historical, mode) {
  if (mode === 'daily') {
    const colors = historical.daily_pct.map(v => v === null ? '#8b949e' : v >= 0 ? '#3fb950' : '#f85149');
    // Shade zero line
    const traces = [
      { x: historical.dates, y: historical.daily_pct, type: 'bar', name: 'Daily Return',
        marker: {color: colors},
        hovertemplate: '%{x}<br>Daily Return: %{y:.3f}%<extra></extra>' },
    ];
    const layout = {...chartLayout(true),
      yaxis: {...chartLayout(true).yaxis, title: {text: 'Daily Return (%)', font:{size:11,color:'#8b949e'}}, ticksuffix: '%', zeroline: true, zerolinecolor: 'rgba(255,255,255,0.15)'},
      bargap: 0.1};
    Plotly.newPlot('returnsChart', traces, layout, {responsive: true, displayModeBar: false});
  } else {
    // Volume mode
    const colors = historical.close.map((c, i) =>
      i === 0 ? '#58a6ff' : (c >= historical.close[i-1] ? '#3fb950' : '#f85149'));
    Plotly.newPlot('returnsChart', [{
      x: historical.dates, y: historical.volume, type: 'bar', name: 'Volume',
      marker: {color: colors},
      hovertemplate: '%{x}<br>Volume: %{y:,.0f}<extra></extra>'
    }], chartLayout(true), {responsive: true, displayModeBar: false});
  }
}

// ─── Backtest accuracy panel ──────────────────────────────────────────────────
function renderBacktestPanel(backtest, predictions) {
  const modelMeta = {
    linear_regression: {label: 'Linear Regression', color: '#3fb950'},
    arima:             {label: 'ARIMA',              color: '#58a6ff'},
    ema_crossover:     {label: 'EMA Crossover',      color: '#e3b341'},
    holt_winters:      {label: 'Holt-Winters',       color: '#f97316'},
  };
  const rows = Object.entries(backtest).map(([key, acc]) => {
    const pct  = Math.round(acc * 100);
    const edge  = pct - 50;
    const edgeStr = edge >= 0 ? `+${edge}pp` : `${edge}pp`;
    const color = acc >= 0.58 ? '#3fb950' : acc >= 0.53 ? '#e3b341' : '#8b949e';
    const meta  = modelMeta[key] || {label: key, color: '#8b949e'};
    const modelPred = predictions[key] || {};
    const correct = modelPred.bt_correct ?? '?';
    const total   = modelPred.bt_total   ?? '?';
    const sampleStr = total !== '?' ? `${correct}/${total} windows` : '';
    return `
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:0.82rem;font-weight:600">${meta.label}</span>
          <span style="font-size:0.82rem;color:${color};font-weight:700">${pct}%
            <span style="font-size:0.7rem;color:var(--text2)">(${edgeStr} vs random${sampleStr ? ', ' + sampleStr : ''})</span>
          </span>
        </div>
        <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;position:relative">
          <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.2)"></div>
          <div style="width:${pct}%;height:100%;background:${color};border-radius:3px;transition:width 0.6s"></div>
        </div>
      </div>`;
  });
  const note = `<div style="font-size:0.7rem;color:var(--text2);margin-top:12px;line-height:1.5;border-top:1px solid var(--border);padding-top:10px">
    Bayesian-adjusted accuracy over 20 out-of-sample walk-forward windows.
    Small sample counts are pulled toward 50% (coin-flip baseline) to prevent overconfidence —
    a model that went 5/5 on trending data still shows ~65%, not 100%.
    Academic research finds 52–58% is typical for quant models on liquid equities; above 60% is considered strong edge.
  </div>`;
  document.getElementById('btPanel').innerHTML = rows.join('') + note;
}

// ─── Consensus panel ──────────────────────────────────────────────────────────
function renderConsensusPanel(predictions, currentPrice, stats) {
  const ens = predictions.ensemble;
  if (!ens) { document.getElementById('consensusPanel').innerHTML = 'N/A'; return; }

  const { agreement, consensus, pred_range } = ens;
  const agreePct = Math.round(agreement * 100);
  const csColor  = consensus === 'UP' ? 'var(--up)' : 'var(--down)';
  const csArrow  = consensus === 'UP' ? '▲' : '▼';

  // Count individual model directions
  const modelKeys = ['linear_regression', 'arima', 'ema_crossover', 'holt_winters'];
  const dirs = modelKeys.map(k => {
    if (!predictions[k]) return null;
    const target = predictions[k].predictions[predictions[k].predictions.length - 1];
    return target >= currentPrice ? 'UP' : 'DOWN';
  }).filter(Boolean);
  const upCount   = dirs.filter(d => d === 'UP').length;
  const downCount = dirs.filter(d => d === 'DOWN').length;

  const rangeChgLow  = ((pred_range.low  - currentPrice) / currentPrice * 100).toFixed(2);
  const rangeChgHigh = ((pred_range.high - currentPrice) / currentPrice * 100).toFixed(2);

  document.getElementById('consensusPanel').innerHTML = `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
      <div style="text-align:center">
        <div style="font-size:2.5rem;font-weight:800;color:${csColor}">${csArrow} ${consensus}</div>
        <div style="font-size:0.75rem;color:var(--text2)">Model consensus</div>
      </div>
      <div style="flex:1">
        <div style="font-size:0.8rem;color:var(--text2);margin-bottom:4px">Agreement: <strong style="color:var(--text)">${agreePct}%</strong> of models agree</div>
        <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden">
          <div style="width:${agreePct}%;height:100%;background:${agreePct>=75?'var(--up)':agreePct>=60?'var(--warn)':'var(--text2)'};border-radius:4px"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <span style="color:var(--up);font-size:0.8rem;font-weight:600">▲ UP: ${upCount}</span>
          <span style="color:var(--down);font-size:0.8rem;font-weight:600">▼ DOWN: ${downCount}</span>
        </div>
      </div>
    </div>
    <div style="background:var(--surface2);border-radius:8px;padding:12px">
      <div style="font-size:0.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px">Prediction Range (across all models)</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:0.85rem"><span style="color:var(--text2)">Low</span> <strong>$${fmt(pred_range.low)}</strong> <span style="color:${rangeChgLow>=0?'var(--up)':'var(--down)'};">${rangeChgLow>=0?'+':''}${rangeChgLow}%</span></span>
        <span style="font-size:0.85rem"><span style="color:var(--text2)">High</span> <strong>$${fmt(pred_range.high)}</strong> <span style="color:${rangeChgHigh>=0?'var(--up)':'var(--down)'};">${rangeChgHigh>=0?'+':''}${rangeChgHigh}%</span></span>
      </div>
      <div style="font-size:0.75rem;color:var(--text2)">Spread: <strong style="color:var(--text)">${pred_range.spread_pct}%</strong> — ${pred_range.spread_pct < 2 ? 'High model agreement on magnitude' : pred_range.spread_pct < 5 ? 'Moderate uncertainty' : 'High uncertainty — models diverge significantly'}</div>
    </div>`;
}

// ─── Model Table ──────────────────────────────────────────────────────────────
function renderModelTable(predictions, currentPrice, backtest) {
  const bt = backtest || {};
  const btKey = {linear_regression:'linear_regression', arima:'arima', ema_crossover:'ema_crossover', holt_winters:'holt_winters', ensemble: null};
  const rows = Object.entries(predictions).map(([key, m]) => {
    const target = m.predictions[m.predictions.length - 1];
    const chg  = ((target - currentPrice) / currentPrice) * 100;
    const conf = Math.round((m.confidence || 0) * 100);
    const dir  = target >= currentPrice ? '<span class="up">▲ UP</span>' : '<span class="down">▼ DOWN</span>';
    const btVal = btKey[key] && bt[btKey[key]] ? `${Math.round(bt[btKey[key]]*100)}%` : (key === 'ensemble' ? `${conf}%` : '—');
    return `<tr>
      <td class="model-name">${m.label}${key === 'ensemble' ? '<span class="model-badge badge-ensemble">BEST</span>' : ''}</td>
      <td>$${fmt(target)}</td>
      <td class="${chg >= 0 ? 'up' : 'down'}">${chg >= 0 ? '+' : ''}${fmt(chg)}%</td>
      <td>${dir}</td>
      <td><div style="display:flex;align-items:center;gap:6px">
        <div style="flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden">
          <div style="width:${conf}%;height:100%;background:${conf>=58?'var(--up)':conf>=53?'var(--warn)':'var(--text2)'};border-radius:3px"></div>
        </div><span style="font-size:0.8rem">${btVal}</span></div></td>
    </tr>`;
  });
  document.getElementById('modelTable').innerHTML =
    `<tr><th>Model</th><th>Target</th><th>Change</th><th>Direction</th><th>Backtest Acc.</th></tr>${rows.join('')}`;
}

// ─── Chart Layout ─────────────────────────────────────────────────────────────
function chartLayout(compact = false) {
  return {
    paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
    margin: {t: 10, b: compact ? 40 : 50, l: 60, r: 20},
    font: {color: '#8b949e', size: 11},
    xaxis: {gridcolor: '#21262d', linecolor: '#30363d', tickcolor: '#30363d'},
    yaxis: {gridcolor: '#21262d', linecolor: '#30363d', tickcolor: '#30363d'},
    legend: {bgcolor: 'transparent', font: {color: '#8b949e'}},
    hoverlabel: {bgcolor: '#1c2128', bordercolor: '#30363d', font: {color: '#e6edf3'}},
  };
}

// ─── Formatters ───────────────────────────────────────────────────────────────
function round2(n) { return Math.round(n * 100) / 100; }
function fmt(n) { if (n === null || n === undefined) return 'N/A'; return parseFloat(n).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
function fmtVol(n) { if (!n) return 'N/A'; if (n >= 1e9) return (n/1e9).toFixed(1) + 'B'; if (n >= 1e6) return (n/1e6).toFixed(1) + 'M'; if (n >= 1e3) return (n/1e3).toFixed(1) + 'K'; return n; }
function fmtMktCap(n) { if (!n) return 'N/A'; if (n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T'; if (n >= 1e9) return '$' + (n/1e9).toFixed(1) + 'B'; if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M'; return '$' + n; }
function horizonLabel(h) { return {day: 'Next Day', week: 'Next Week', month: 'Next Month'}[h] || h; }

init();

// ─── Portfolio ─────────────────────────────────────────────────────────────────
async function loadPortfolio(silent = false) {
  if (!silent) {
    document.getElementById('portfolioContent').innerHTML =
      `<div class="loading"><div class="spinner"></div><div style="color:var(--text2)">Loading portfolio...</div></div>`;
  }
  try {
    const res  = await fetch('/api/portfolio');
    const data = await res.json();
    pfLastFetch = Date.now();
    renderPortfolio(data);
  } catch(e) {
    if (!silent) {
      document.getElementById('portfolioContent').innerHTML =
        `<div class="error-box">Failed to load portfolio: ${e.message}</div>`;
    }
  }
}

async function triggerRebalance() {
  const btn = document.getElementById('rebalanceBtn');
  btn.disabled = true; btn.textContent = 'Rebalancing…';
  try {
    const res = await fetch('/api/portfolio/rebalance', {method:'POST',
      headers:{'Content-Type':'application/json'}, body: JSON.stringify({horizon:'week'})});
    const d = await res.json();
    if (d.ok) {
      btn.textContent = d.summary || 'Done';
      setTimeout(() => loadPortfolio(), 800);
    } else {
      // Cooldown active — show the wait message, re-enable after 3s
      btn.textContent = d.summary;
      btn.style.color = 'var(--down)';
      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = '▶ Run Rebalance Now';
        btn.style.color = '';
      }, 3000);
    }
  } catch(e) {
    btn.textContent = 'Error – retry';
    btn.disabled = false;
  }
}

        const badge     = p.signal_stale
          ? `<span class="stale-badge">SELL NEXT RUN</span>` : '';
        liveStr = `<span style="color:${liveColor};font-weight:700">${liveDir} ${liveConf} · ${p.current_pred_pct>0?'+':''}${p.current_pred_pct}%</span>${badge}`;
      }

      return `<tr class="${rowClass}">
        <td><span class="pf-sym">${p.symbol}</span></td>
        <td>${p.shares}</td>
        <td>$${fmt(p.entry_price)}</td>
        <td>$${fmt(p.current_price)}</td>
        <td>$${fmtK(p.cost_basis)}</td>
        <td style="color:${pnlColor};font-weight:700">${pnlSign}$${fmtK(Math.abs(p.pnl))}</td>
        <td style="color:${pnlColor};font-weight:700">${pnlSign}${p.pnl_pct.toFixed(2)}%</td>
        <td style="font-size:0.75rem;color:var(--text2)">${p.entry_date}<br><span style="font-size:0.68rem">Entry: ${entryStr}</span></td>
        <td style="font-size:0.78rem">${liveStr}</td>
      </tr>`;
    }).join('');
    posHTML = `<div class="pf-pos-table-wrap"><table class="pf-pos-table">
      <thead><tr>
        <th>Ticker</th><th>Shares</th><th>Entry $</th><th>Current $</th>
        <th>Cost</th><th>P&L</th><th>P&L %</th><th>Bought · Entry signal</th><th>Live signal</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  }

  // ── Trades (paginated) ────────────────────────────────────────────────────
  window._pfAllTrades  = d.trades || [];
  window._pfTradeLimit = 20;
  let tradeHTML = window._pfRenderTrades();

  document.getElementById('portfolioContent').innerHTML = `
    ${summaryHTML}
    ${actionsHTML}
    ${equityHTML}
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Open Positions</div>
      ${posHTML}
    </div>
    <div class="card">
      <div class="card-title">Trade History <span style="font-size:0.7rem;color:var(--text2);font-weight:400">(${window._pfAllTrades.length > 50 ? '50+ shown' : window._pfAllTrades.length + ' total'})</span></div>
      <div id="pfTradesContainer">${tradeHTML}</div>
    </div>`;

  // ── Render equity curve with Plotly ───────────────────────────────────────
  if (d.daily_values && d.daily_values.length > 1) {
    const dates    = d.daily_values.map(v => v.date);
    const vals     = d.daily_values.map(v => v.value);
    const isUp     = vals[vals.length - 1] >= d.initial_balance;
    const lineCol  = isUp ? '#3fb950' : '#f85149';
    const fillCol  = isUp ? 'rgba(63,185,80,0.12)' : 'rgba(248,81,73,0.12)';
    const baseline = d.initial_balance;

    // SPY benchmark: spy_history has ~60 trading days of data from the backend.
    // Draw a continuous line from portfolio start date using all available dates.
    const spyHist   = d.spy_history || {};
    const spyTraces = [];
    const portfolioStart = d.created || dates[0];
    // All spy_history dates on or after the portfolio start, sorted ascending
    const spyDates = Object.keys(spyHist).sort().filter(dt => dt >= portfolioStart);
    if (spyDates.length >= 2) {
      const spy0    = spyHist[spyDates[0]];
      const spyVals = spyDates.map(dt => d.initial_balance * (spyHist[dt] / spy0));
      spyTraces.push({
        x: spyDates, y: spyVals, type: 'scatter', mode: 'lines',
        name: 'SPY benchmark',
        line: {color: 'rgba(139,148,158,0.55)', width: 1.5, dash: 'dot'},
        hovertemplate: '%{x}<br>SPY equiv: <b>$%{y:,.0f}</b><extra></extra>',
        showlegend: true,
      });
    }

    // Baseline trace first so fill:'tonexty' draws a band, not a solid block.
    const allVals = [...vals, baseline, ...spyTraces.flatMap(t => t.y)];
    Plotly.newPlot('pfEquityChart', [
      {
        x: [dates[0], dates[dates.length - 1]],
        y: [baseline, baseline],
        type: 'scatter', mode: 'lines',
        line: {color: 'rgba(255,255,255,0.18)', width: 1, dash: 'dot'},
        hoverinfo: 'none', showlegend: false,
      },
      {
        x: dates, y: vals, type: 'scatter', mode: 'lines',
        name: 'Portfolio',
        line: {color: lineCol, width: 2},
        fill: 'tonexty', fillcolor: fillCol,
        hovertemplate: '%{x}<br>Portfolio: <b>$%{y:,.0f}</b><extra></extra>',
        showlegend: spyTraces.length > 0,
      },
      ...spyTraces,
    ], {
      paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
      margin: {t: 10, b: 40, l: 70, r: 10},
      xaxis: {color: '#8b949e', gridcolor: 'rgba(48,54,61,0.5)', tickfont: {size: 10}},
      yaxis: {
        color: '#8b949e', gridcolor: 'rgba(48,54,61,0.5)', tickfont: {size: 10},
        tickprefix: '$', tickformat: ',.0f',
        range: [
          Math.min(...allVals) * 0.998,
          Math.max(...allVals) * 1.002,
        ],
      },
      legend: {
        x: 0.01, y: 0.99, bgcolor: 'transparent',
        font: {color: '#8b949e', size: 10},
      },
      showlegend: spyTraces.length > 0,
    }, {responsive: true, displayModeBar: false});
  } else {
    document.getElementById('pfEquityChart').innerHTML =
      `<div class="pf-empty">Equity curve will appear after the first rebalance day.</div>`;
  }
}

function fmtK(n) {
  if (Math.abs(n) >= 1000) return (n/1000).toFixed(1) + 'k';
  return n.toFixed(2);
}

// Global trade pagination helpers (must be global so onclick= can reach them)
window._pfRenderTrades = function() {
  const all = window._pfAllTrades || [];
  if (!all.length) return `<div class="pf-empty">No trades yet.</div>`;
  const visible = all.slice(0, window._pfTradeLimit);
  const rows = visible.map(t => {
    const cls      = t.action === 'BUY' ? 'trade-buy' : 'trade-sell';
    const actColor = t.action === 'BUY' ? 'var(--up)' : 'var(--down)';
    const pnlStr   = t.pnl != null
      ? `<span style="color:${t.pnl>=0?'var(--up)':'var(--down)'};">${t.pnl>=0?'+':''}$${fmtK(Math.abs(t.pnl))}</span>`
      : '—';
    return `<tr class="${cls}">
      <td>${t.date}</td>
      <td><span class="pf-sym">${t.ticker}</span></td>
      <td style="font-weight:700;color:${actColor}">${t.action}</td>
      <td>${t.shares}</td>
      <td>$${fmt(t.price)}</td>
      <td>$${fmtK(t.value)}</td>
      <td>${pnlStr}</td>
      <td style="font-size:0.7rem;color:var(--text2)">${t.reason || ''}</td>
    </tr>`;
  }).join('');
  const remaining = all.length - window._pfTradeLimit;
  const more = remaining > 0
    ? `<button class="pf-load-more" onclick="window._pfLoadMoreTrades()">Load more (${remaining} remaining)</button>`
    : '';
  return `<div class="pf-trade-table-wrap"><table class="pf-trade-table">
    <thead><tr>
      <th>Date</th><th>Ticker</th><th>Action</th><th>Shares</th>
      <th>Price</th><th>Value</th><th>P&L</th><th>Reason</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>${more}`;
};

window._pfLoadMoreTrades = function() {
  window._pfTradeLimit += 20;
  const container = document.getElementById('pfTradesContainer');
  if (container) container.innerHTML = window._pfRenderTrades();
};
</script>
</body>
</html>
